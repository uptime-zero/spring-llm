<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로컬 AI 챗봇</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 1000px;
      height: 90vh;
      display: flex;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    /* ── 사이드바 ── */
    .sidebar {
      width: 220px;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 16px;
    }

    .new-chat-btn {
      width: 100%;
      padding: 10px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s;
    }

    .new-chat-btn:hover { background: rgba(255,255,255,0.08); }

    .conv-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px 8px;
    }

    .conv-item {
      padding: 9px 10px;
      border-radius: 6px;
      color: rgba(255,255,255,0.75);
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .conv-item:hover { background: rgba(255,255,255,0.08); }
    .conv-item.active { background: rgba(255,255,255,0.15); color: #fff; }

    .conv-item-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .conv-delete-btn {
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
      border-radius: 4px;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: color 0.15s, background 0.15s;
    }

    .conv-item:hover .conv-delete-btn { display: flex; }
    .conv-delete-btn:hover { color: #ff6b6b; background: rgba(255,255,255,0.1); }

    .conv-rename-btn {
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      font-size: 11px;
      line-height: 1;
      cursor: pointer;
      border-radius: 4px;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: color 0.15s, background 0.15s;
    }
    .conv-item:hover .conv-rename-btn { display: flex; }
    .conv-rename-btn:hover { color: #fff; background: rgba(255,255,255,0.1); }

    .conv-item-title-input {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255,255,255,0.5);
      color: #fff;
      font-size: 13px;
      outline: none;
      min-width: 0;
    }

    /* ── 메인 채팅 영역 ── */
    .main {
      flex: 1;
      background: #fff;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .header {
      padding: 14px 20px;
      border-bottom: 1px solid #e5e5e5;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #1a1a1a;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .model-select {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #666;
      flex-shrink: 0;
    }

    .model-input {
      padding: 4px 8px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      width: 150px;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 75%;
    }

    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.bot  { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .bubble {
      background: #1a73e8;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.bot .bubble {
      background: #f0f0f0;
      color: #1a1a1a;
      border-bottom-left-radius: 4px;
    }

    .message.bot .bubble.thinking::after {
      content: '▋';
      animation: blink 0.7s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .input-area {
      padding: 16px 20px;
      border-top: 1px solid #e5e5e5;
      display: flex;
      gap: 10px;
    }

    #msg {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 24px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      resize: none;
    }

    #msg:focus { border-color: #1a73e8; }

    #send-btn {
      padding: 10px 20px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    #send-btn:hover    { background: #1558b0; }
    #send-btn:disabled { background: #aaa; cursor: not-allowed; }
  </style>
</head>
<body>
<div class="app">

  <!-- 사이드바 -->
  <div class="sidebar">
    <div class="sidebar-header">
      <button class="new-chat-btn" onclick="newChat()">+ 새 채팅</button>
    </div>
    <div class="conv-list" id="conv-list"></div>
  </div>

  <!-- 채팅 영역 -->
  <div class="main">
    <div class="header">
      <h1 id="conv-title">새 채팅</h1>
      <div class="model-select">
        <label for="model-input">모델</label>
        <input id="model-input" class="model-input" type="text" placeholder="기본값 (gemma3:1b)" />
      </div>
    </div>

    <div id="chat"></div>

    <div class="input-area">
      <textarea id="msg" rows="1" placeholder="메시지를 입력하세요... (Shift+Enter: 줄바꿈)"></textarea>
      <button id="send-btn" onclick="send()">전송</button>
    </div>
  </div>

</div>

<script>
  // ── 상태 ──────────────────────────────────────────────
  const STORAGE_KEY = 'chatbot_conversations';
  let currentId = null;
  const activeStreams = new Map(); // conversationId → EventSource

  // 저장 구조: { [id]: { title: string, messages: [{role, text}], model: string } }
  function loadStore() {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  }

  function saveStore(store) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(store));
  }

  // ── 대화 목록 렌더링 ──────────────────────────────────
  function renderConvList() {
    const store = loadStore();
    const listEl = document.getElementById('conv-list');
    listEl.innerHTML = '';

    Object.entries(store).reverse().forEach(([id, conv]) => {
      const item = document.createElement('div');
      item.className = 'conv-item' + (id === currentId ? ' active' : '');

      item.onclick = () => switchConv(id);

      const title = document.createElement('span');
      title.className = 'conv-item-title';
      title.textContent = conv.title || '새 채팅';

      const renameBtn = document.createElement('button');
      renameBtn.className = 'conv-rename-btn';
      renameBtn.textContent = '✏';
      renameBtn.title = '이름 변경';
      renameBtn.onclick = (e) => { e.stopPropagation(); startRename(id, conv.title || '새 채팅', title); };

      const delBtn = document.createElement('button');
      delBtn.className = 'conv-delete-btn';
      delBtn.textContent = '×';
      delBtn.title = '대화 삭제';
      delBtn.onclick = (e) => { e.stopPropagation(); deleteConv(id); };

      item.appendChild(title);
      item.appendChild(renameBtn);
      item.appendChild(delBtn);
      listEl.appendChild(item);
    });
  }

  function startRename(id, currentTitle, titleEl) {
    const input = document.createElement('input');
    input.className = 'conv-item-title-input';
    input.value = currentTitle;
    titleEl.replaceWith(input);
    input.focus();
    input.select();

    let committed = false;
    function commit() {
      if (committed) return;
      committed = true;
      const newTitle = input.value.trim();
      if (newTitle && newTitle !== currentTitle) {
        renameConv(id, newTitle);
      } else {
        renderConvList();
      }
    }

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); commit(); }
      if (e.key === 'Escape') { committed = true; renderConvList(); }
    });
    input.addEventListener('blur', commit);
  }

  function renameConv(id, newTitle) {
    const store = loadStore();
    store[id].title = newTitle;
    saveStore(store);
    if (id === currentId) {
      document.getElementById('conv-title').textContent = newTitle;
    }
    renderConvList();
  }

  function updateSendBtn() {
    sendBtn.disabled = activeStreams.has(currentId);
  }

  function deleteConv(id) {
    const store = loadStore();
    delete store[id];
    saveStore(store);

    const ids = Object.keys(store);
    if (id === currentId) {
      if (ids.length > 0) {
        switchConv(ids[ids.length - 1]);
      } else {
        newChat();
      }
    } else {
      renderConvList();
    }
  }

  // ── 채팅 메시지 렌더링 ───────────────────────────────
  function renderMessages(messages) {
    const chatEl = document.getElementById('chat');
    chatEl.innerHTML = '';
    messages.forEach(({ role, text }) => appendBubble(role, text));
  }

  function appendBubble(role, text) {
    const chatEl = document.getElementById('chat');
    const wrapper = document.createElement('div');
    wrapper.className = `message ${role}`;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    wrapper.appendChild(bubble);
    chatEl.appendChild(wrapper);
    chatEl.scrollTop = chatEl.scrollHeight;
    return bubble;
  }

  // ── 새 채팅 ───────────────────────────────────────────
  function newChat() {
    const id = crypto.randomUUID();
    const store = loadStore();
    store[id] = { title: '새 채팅', messages: [], model: '' };
    saveStore(store);
    switchConv(id);
  }

  // ── 대화 전환 ─────────────────────────────────────────
  function switchConv(id) {
    currentId = id;
    const store = loadStore();
    const conv = store[id];
    document.getElementById('conv-title').textContent = conv.title;
    modelInput.value = conv.model || '';
    renderMessages(conv.messages);
    renderConvList();
    updateSendBtn();
  }

  // ── 메시지 저장 ───────────────────────────────────────
  function saveMessage(role, text, id = currentId) {
    const store = loadStore();
    const conv = store[id];
    conv.messages.push({ role, text });
    if (role === 'user' && conv.title === '새 채팅') {
      conv.title = text.slice(0, 28) + (text.length > 28 ? '…' : '');
      if (id === currentId) {
        document.getElementById('conv-title').textContent = conv.title;
      }
    }
    saveStore(store);
    renderConvList();
  }

  // ── 전송 ─────────────────────────────────────────────
  const msgEl   = document.getElementById('msg');
  const sendBtn = document.getElementById('send-btn');
  const modelInput = document.getElementById('model-input');

  msgEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  msgEl.addEventListener('input', () => {
    msgEl.style.height = 'auto';
    msgEl.style.height = Math.min(msgEl.scrollHeight, 120) + 'px';
  });

  modelInput.addEventListener('input', () => {
    if (!currentId) return;
    const store = loadStore();
    if (store[currentId]) {
      store[currentId].model = modelInput.value.trim();
      saveStore(store);
    }
  });

  async function send() {
    const text = msgEl.value.trim();
    if (!text || activeStreams.has(currentId)) return;

    msgEl.value = '';
    msgEl.style.height = 'auto';

    const sendId = currentId;

    saveMessage('user', text, sendId);
    appendBubble('user', text);

    const bubble = appendBubble('bot', '');
    bubble.classList.add('thinking');

    const model = modelInput.value.trim();
    const params = new URLSearchParams({ message: text, conversationId: sendId });
    if (model) params.append('model', model);

    const es = new EventSource(`/api/chat/stream?${params}`);
    activeStreams.set(sendId, es);
    updateSendBtn();

    let response = '';
    let first = true;

    es.onmessage = (e) => {
      if (first) { bubble.classList.remove('thinking'); first = false; }
      response += JSON.parse(e.data);
      bubble.textContent = response;
      if (sendId === currentId) {
        document.getElementById('chat').scrollTop = 99999;
      }
    };

    es.onerror = () => {
      es.close();
      if (first) {
        bubble.classList.remove('thinking');
        bubble.textContent = '응답을 받지 못했습니다.';
      }
      if (response) saveMessage('bot', response, sendId);
      activeStreams.delete(sendId);
      updateSendBtn();
    };

    es.addEventListener('complete', () => {
      es.close();
      if (response) saveMessage('bot', response, sendId);
      activeStreams.delete(sendId);
      updateSendBtn();
    });
  }

  // ── 초기화 ────────────────────────────────────────────
  (function init() {
    const store = loadStore();
    const ids = Object.keys(store);
    if (ids.length > 0) {
      switchConv(ids[ids.length - 1]);
    } else {
      newChat();
    }
  })();
</script>
</body>
</html>
