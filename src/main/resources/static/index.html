<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로컬 AI 챗봇</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 800px;
      height: 90vh;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      padding: 16px 20px;
      border-bottom: 1px solid #e5e5e5;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .model-select {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #666;
    }

    .model-select select {
      padding: 4px 8px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      background: #fafafa;
      cursor: pointer;
    }

    .model-input {
      padding: 4px 8px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      width: 160px;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 75%;
    }

    .message.user {
      align-self: flex-end;
      align-items: flex-end;
    }

    .message.bot {
      align-self: flex-start;
      align-items: flex-start;
    }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .bubble {
      background: #1a73e8;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.bot .bubble {
      background: #f0f0f0;
      color: #1a1a1a;
      border-bottom-left-radius: 4px;
    }

    .message.bot .bubble.thinking::after {
      content: '▋';
      animation: blink 0.7s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .input-area {
      padding: 16px 20px;
      border-top: 1px solid #e5e5e5;
      display: flex;
      gap: 10px;
    }

    #msg {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 24px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      resize: none;
    }

    #msg:focus { border-color: #1a73e8; }

    #send-btn {
      padding: 10px 20px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    #send-btn:hover { background: #1558b0; }
    #send-btn:disabled { background: #aaa; cursor: not-allowed; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>로컬 AI 챗봇</h1>
    <div class="model-select">
      <label for="model-input">모델</label>
      <input id="model-input" class="model-input" type="text" placeholder="기본값 (gemma3:1b)" />
    </div>
  </div>

  <div id="chat"></div>

  <div class="input-area">
    <textarea id="msg" rows="1" placeholder="메시지를 입력하세요... (Shift+Enter: 줄바꿈)"></textarea>
    <button id="send-btn" onclick="send()">전송</button>
  </div>
</div>

<script>
  const sessionId = crypto.randomUUID();

  const chatEl = document.getElementById('chat');
  const msgEl = document.getElementById('msg');
  const sendBtn = document.getElementById('send-btn');
  const modelInput = document.getElementById('model-input');

  msgEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  msgEl.addEventListener('input', () => {
    msgEl.style.height = 'auto';
    msgEl.style.height = Math.min(msgEl.scrollHeight, 120) + 'px';
  });

  function appendMessage(role, text) {
    const wrapper = document.createElement('div');
    wrapper.className = `message ${role}`;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    wrapper.appendChild(bubble);
    chatEl.appendChild(wrapper);
    chatEl.scrollTop = chatEl.scrollHeight;
    return bubble;
  }

  async function send() {
    const text = msgEl.value.trim();
    if (!text || sendBtn.disabled) return;

    msgEl.value = '';
    msgEl.style.height = 'auto';
    sendBtn.disabled = true;

    appendMessage('user', text);

    const bubble = appendMessage('bot', '');
    bubble.classList.add('thinking');

    const model = modelInput.value.trim();
    const params = new URLSearchParams({ message: text, conversationId: sessionId });
    if (model) params.append('model', model);

    const es = new EventSource(`/api/chat/stream?${params}`);
    let first = true;

    es.onmessage = (e) => {
      if (first) {
        bubble.classList.remove('thinking');
        first = false;
      }
      bubble.textContent += e.data;
      chatEl.scrollTop = chatEl.scrollHeight;
    };

    es.onerror = () => {
      es.close();
      if (first) {
        bubble.classList.remove('thinking');
        bubble.textContent = '응답을 받지 못했습니다.';
      }
      sendBtn.disabled = false;
    };

    es.addEventListener('complete', () => {
      es.close();
      sendBtn.disabled = false;
    });
  }
</script>
</body>
</html>
