spring:
  application:
    name: ollama-chatbot

  ai:
    ollama:
      base-url: http://localhost:11434   # 로컬 Ollama

  # 로컬 개발: H2 인메모리
  datasource:
    url: jdbc:h2:mem:chatdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true                      # localhost:8080/h2-console 접속 가능
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    open-in-view: true

server:
  port: 8080

# Actuator — 로컬 전체 노출
management:
  endpoints:
    web:
      exposure:
        include: "*"

chatbot:
  client:
    system-prompt: |
      당신은 친절하고 유능한 AI 어시스턴트입니다.
      한국어로 답변하며, 명확하고 간결하게 설명합니다.
    model: gemma3:1b
    think: false
    temperature: 0.7
    num-predict: 3200
  memory:
    max-messages: 20